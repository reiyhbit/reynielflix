<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat3Movie M3U Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: rgba(255,255,255,0.8);
        }
        
        /* URL Bar */
        .url-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .url-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            min-width: 250px;
        }
        .url-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .url-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .nav-btn {
            padding: 15px 30px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        /* Proxy Selector */
        .proxy-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .proxy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }
        .proxy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .proxy-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        /* Main Content */
        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .panel-header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .panel-content {
            padding: 20px;
            max-height: 500px;
            overflow: auto;
        }
        
        /* Source Panel */
        .source-content {
            font-family: monospace;
            font-size: 12px;
            color: #0ff;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .highlight {
            background: #4ade80;
            color: black;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .highlight-m3u8 {
            background: #ff6b6b;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }
        
        /* Extract Panel */
        .m3u8-found {
            background: rgba(74, 222, 128, 0.1);
            border-left: 4px solid #4ade80;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .logo-found {
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid #fbbf24;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .m3u8-link {
            background: rgba(0,0,0,0.3);
            color: #4ade80;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 10px 0;
        }
        .logo-preview {
            max-width: 150px;
            max-height: 200px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #fbbf24;
        }
        
        /* M3U Output */
        .m3u-output {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .m3u-header {
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .m3u-content {
            background: rgba(0,0,0,0.5);
            color: #ffd700;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 150px;
            overflow: auto;
            white-space: pre-wrap;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        /* Status Bar */
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 14px;
        }
        
        /* Manual Mode */
        .manual-area {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            color: #0ff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎬 Cat3Movie M3U Generator</h1>
            <p>I-paste ang movie link at auto-generate ng M3U file kasama ang logo</p>
        </div>

        <!-- URL Bar -->
        <div class="url-bar">
            <input type="text" class="url-input" id="urlInput" placeholder="https://www.cat3movie.club/movie-name/" value="https://www.cat3movie.club/bulong-ng-laman/">
            <button class="nav-btn" onclick="loadPage()">GENERATE M3U</button>
        </div>

        <!-- Proxy Selector -->
        <div class="proxy-selector" id="proxySelector">
            <button class="proxy-btn active" onclick="setProxy('corsproxy')">🔄 CORS Proxy</button>
            <button class="proxy-btn" onclick="setProxy('allorigins')">🌐 AllOrigins</button>
            <button class="proxy-btn" onclick="setProxy('thingproxy')">🔧 ThingProxy</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel: View Source -->
            <div class="panel">
                <div class="panel-header">
                    📄 VIEW SOURCE | <span style="color: #4ade80;">Ctrl+F: "m3u8"</span>
                </div>
                <div class="panel-content">
                    <div class="source-content" id="sourceContent">
                        I-paste ang URL at i-click GENERATE M3U
                    </div>
                </div>
            </div>

            <!-- Right Panel: Extract & Generate -->
            <div class="panel">
                <div class="panel-header">
                    🔍 EXTRACT & GENERATE | <span style="color: #fbbf24;">M3U8 + LOGO = M3U</span>
                </div>
                <div class="panel-content" id="extractContent">
                    <div style="color: rgba(255,255,255,0.5); text-align: center; padding: 50px 20px;">
                        ⚡ Maghintay habang naglo-load...
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            ✅ Ready | I-paste ang movie link at i-click GENERATE M3U
        </div>
    </div>

    <script>
        let currentProxy = 'corsproxy';
        let currentM3U8 = '';
        let currentLogo = '';
        let currentTitle = '';

        const proxies = {
            'corsproxy': 'https://corsproxy.io/?',
            'allorigins': 'https://api.allorigins.win/raw?url=',
            'thingproxy': 'https://thingproxy.freeboard.io/fetch/'
        };

        function setProxy(proxy) {
            currentProxy = proxy;
            document.querySelectorAll('.proxy-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateStatus(`✅ Proxy set to: ${proxy}`);
        }

        async function loadPage() {
            let url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            updateStatus('⏳ Loading page source...');
            document.getElementById('sourceContent').innerHTML = '⏳ Fetching page source...';
            document.getElementById('extractContent').innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 50px 20px;">⏳ Extracting M3U8 and logo...</div>';

            // Try proxies
            let html = null;
            
            for (let proxy of ['corsproxy', 'allorigins', 'thingproxy']) {
                try {
                    updateStatus(`⏳ Trying ${proxy}...`);
                    let proxyUrl = proxies[proxy] + encodeURIComponent(url);
                    
                    let response = await fetch(proxyUrl, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        }
                    });
                    
                    if (response.ok) {
                        html = await response.text();
                        updateStatus(`✅ Loaded using ${proxy}`);
                        break;
                    }
                } catch (e) {
                    console.log(`${proxy} failed:`, e);
                }
            }

            if (html) {
                displaySource(html);
                extractAll(html);
            } else {
                // Manual mode
                showManualMode(url);
            }
        }

        function displaySource(html) {
            // Format HTML with highlights
            let formatted = html
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/(https?:[^"'\s]+\.m3u8[^"'\s]*)/g, '<span class="highlight-m3u8">$1</span>')
                .replace(/(https?:[^"'\s]*sooplive[^"'\s]*)/g, '<span class="highlight">$1</span>')
                .replace(/("file":"[^"]+")/g, '<span class="highlight">$1</span>');
            
            document.getElementById('sourceContent').innerHTML = formatted;
        }

        function extractAll(html) {
            let extractDiv = document.getElementById('extractContent');
            let output = '';

            // Reset current values
            currentM3U8 = '';
            currentLogo = '';
            currentTitle = '';

            // 1. Extract M3U8
            let m3u8Patterns = [
                /file:\s*["']([^"']+\.m3u8[^"']*)["']/,
                /(https?:[^"'\s]+sooplive[^"'\s]+\.m3u8[^"'\s]*)/
            ];

            for (let pattern of m3u8Patterns) {
                let match = html.match(pattern);
                if (match && match[1]) {
                    currentM3U8 = match[1];
                    break;
                }
            }

            if (currentM3U8) {
                output += '<div class="m3u8-found">';
                output += '<div style="color:#4ade80; font-weight:bold; margin-bottom:10px;">🎥 M3U8 FOUND</div>';
                output += `<div class="m3u8-link">${currentM3U8}</div>`;
                output += '</div>';
            } else {
                output += '<div class="m3u8-found" style="border-left-color:#ef4444;">';
                output += '<div style="color:#ef4444; font-weight:bold;">❌ NO M3U8 FOUND</div>';
                output += '<div style="color:rgba(255,255,255,0.5); margin-top:10px;">Try searching manually: "file:", "sources:", "m3u8"</div>';
                output += '</div>';
            }

            // 2. Extract Logo (TMDB)
            let logoPattern = /https:\/\/image\.tmdb\.org\/[^"'\s]+/g;
            let logos = html.match(logoPattern);
            
            if (logos && logos.length > 0) {
                currentLogo = logos[0];
                output += '<div class="logo-found">';
                output += '<div style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">🖼️ LOGO FOUND</div>';
                output += `<img src="${currentLogo}" class="logo-preview" onerror="this.style.display='none'">`;
                output += `<div class="m3u8-link" style="color:#fbbf24;">${currentLogo}</div>`;
                output += '</div>';
            }

            // 3. Extract Title
            let titleMatch = html.match(/<title>(.+?)<\/title>/);
            if (titleMatch) {
                currentTitle = titleMatch[1].replace(' | Cat3Movie', '').trim();
                output += '<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:5px; margin-top:15px;">';
                output += '<div style="color:rgba(255,255,255,0.5); margin-bottom:5px;">📌 Movie Title</div>';
                output += `<div style="color:#fff; font-weight:bold;">${currentTitle}</div>`;
                output += '</div>';
            }

            // 4. Generate M3U (kung may m3u8 at logo)
            if (currentM3U8 && currentLogo) {
                let m3uContent = `#EXTM3U\n#EXTINF:-1 tvg-logo="${currentLogo}",${currentTitle || 'Movie'}\n${currentM3U8}`;
                
                output += '<div class="m3u-output">';
                output += '<div class="m3u-header">📀 GENERATED M3U FILE</div>';
                output += `<div class="m3u-content" id="m3uContent">${m3uContent}</div>`;
                output += '<div class="btn-group">';
                output += '<button class="btn btn-primary" onclick="downloadM3U()">⬇️ DOWNLOAD .m3u</button>';
                output += '<button class="btn btn-success" onclick="copyM3U()">📋 COPY M3U</button>';
                output += '</div>';
                output += '</div>';
            } else if (currentM3U8) {
                // M3U8 lang meron, walang logo
                let m3uContent = `#EXTM3U\n#EXTINF:-1,${currentTitle || 'Movie'}\n${currentM3U8}`;
                
                output += '<div class="m3u-output">';
                output += '<div class="m3u-header">📀 GENERATED M3U FILE (no logo)</div>';
                output += `<div class="m3u-content" id="m3uContent">${m3uContent}</div>`;
                output += '<div class="btn-group">';
                output += '<button class="btn btn-primary" onclick="downloadM3U()">⬇️ DOWNLOAD .m3u</button>';
                output += '<button class="btn btn-success" onclick="copyM3U()">📋 COPY M3U</button>';
                output += '</div>';
                output += '</div>';
            }

            extractDiv.innerHTML = output;
        }

        function showManualMode(url) {
            document.getElementById('sourceContent').innerHTML = `
                <div style="color:#ef4444; margin-bottom:10px;">❌ Cannot auto-fetch page</div>
                <div style="color:rgba(255,255,255,0.5); margin-bottom:15px;">Gawin ito:</div>
                <ol style="color:rgba(255,255,255,0.8); margin-left:20px;">
                    <li>I-open sa bagong tab: <b>view-source:${url}</b></li>
                    <li>Ctrl+A, Ctrl+C (copy lahat)</li>
                    <li>I-paste sa box sa ibaba</li>
                </ol>
            `;
            
            document.getElementById('extractContent').innerHTML = `
                <textarea class="manual-area" id="manualSource" placeholder="I-paste ang HTML source dito..."></textarea>
                <button class="btn btn-primary" style="width:100%;" onclick="processManualSource()">🔍 GENERATE M3U FROM SOURCE</button>
            `;
            
            updateStatus('📝 Manual mode - I-paste ang source');
        }

        function processManualSource() {
            let html = document.getElementById('manualSource').value;
            if (html) {
                displaySource(html);
                extractAll(html);
                updateStatus('✅ Manual source processed');
            }
        }

        function downloadM3U() {
            let m3uContent = document.getElementById('m3uContent').textContent;
            let filename = (currentTitle || 'movie').toLowerCase().replace(/[^a-z0-9]+/g, '_') + '.m3u';
            
            let blob = new Blob([m3uContent], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            
            updateStatus('✅ M3U file downloaded');
        }

        function copyM3U() {
            let m3uContent = document.getElementById('m3uContent').textContent;
            navigator.clipboard.writeText(m3uContent);
            updateStatus('✅ M3U copied to clipboard');
        }

        function updateStatus(message) {
            document.getElementById('statusBar').innerHTML = message;
        }
    </script>
</body>
</html>
