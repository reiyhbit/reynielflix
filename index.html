
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat3Movie Site Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p {
            color: rgba(255,255,255,0.8);
        }
        
        /* Browser Controls */
        .browser-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .url-bar {
            flex: 1;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 5px;
            min-width: 300px;
        }
        .url-input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            background: transparent;
            color: white;
            font-size: 15px;
        }
        .url-input:focus {
            outline: none;
        }
        .nav-btn {
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn:hover {
            background: #45a049;
        }
        
        /* Proxy Selector */
        .proxy-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .proxy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        .proxy-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        /* Main Layout */
        .main-layout {
            display: flex;
            gap: 20px;
            height: 700px;
        }
        
        /* Left Panel - Movie List */
        .movie-list-panel {
            width: 250px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .movie-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .movie-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 13px;
        }
        .movie-item:hover {
            background: rgba(255,255,255,0.15);
        }
        
        /* Center Panel - Browser */
        .browser-panel {
            flex: 2;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .browser-frame {
            flex: 1;
            background: white;
            overflow: hidden;
        }
        #browserIframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Right Panel - Extractor */
        .extract-panel {
            width: 350px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .extract-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .video-found {
            background: rgba(74, 222, 128, 0.1);
            border-left: 4px solid #4ade80;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .logo-found {
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid #fbbf24;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .video-link {
            background: rgba(0,0,0,0.3);
            color: #4ade80;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            margin: 10px 0;
        }
        .logo-preview {
            max-width: 150px;
            max-height: 200px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #fbbf24;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-m3u8 { background: #ff6b6b; color: white; }
        .badge-mp4 { background: #4ade80; color: black; }
        
        .m3u-output {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .m3u-content {
            background: rgba(0,0,0,0.5);
            color: #ffd700;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            max-height: 150px;
            overflow: auto;
        }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; }
        
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Cat3Movie Site Browser</h1>
            <p>Browse the actual site and extract videos</p>
        </div>

        <!-- Browser Controls -->
        <div class="browser-controls">
            <div class="url-bar">
                <input type="text" class="url-input" id="urlInput" value="https://www.cat3movie.club/category/vivamax/">
                <button class="nav-btn" onclick="browseSite()">🌐 BROWSE</button>
                <button class="nav-btn" onclick="extractCurrent()">🔍 EXTRACT</button>
            </div>
        </div>

        <!-- Proxy Selector -->
        <div class="proxy-bar">
            <button class="proxy-btn active" onclick="setProxy('corsproxy')">CORS Proxy</button>
            <button class="proxy-btn" onclick="setProxy('allorigins')">AllOrigins</button>
            <button class="proxy-btn" onclick="setProxy('thingproxy')">ThingProxy</button>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left Panel: Quick Links -->
            <div class="movie-list-panel">
                <div class="panel-header">📌 Quick Links</div>
                <div class="movie-list">
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/category/vivamax/')">🎬 Vivamax Home</div>
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/category/korean/')">🇰🇷 Korean</div>
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/category/philipine/')">🇵🇭 Philippine</div>
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/sagaran-mov18plus-full-vivamax-adult-18-movie-online/')">🎥 Sagaran</div>
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/claim-me/')">🎥 Claim Me</div>
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/bulong-ng-laman/')">🎥 Bulong Ng Laman</div>
                    <div class="movie-item" onclick="loadUrl('https://www.cat3movie.club/kinsenas-katapusan-2022/')">🎥 Kinsenas</div>
                </div>
            </div>

            <!-- Center Panel: Live Browser -->
            <div class="browser-panel">
                <div class="browser-frame">
                    <iframe id="browserIframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" style="width:100%; height:100%; border:none;"></iframe>
                </div>
            </div>

            <!-- Right Panel: Extractor -->
            <div class="extract-panel">
                <div class="panel-header">🔍 Extracted Videos</div>
                <div class="extract-content" id="extractContent">
                    <div style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">
                        Click EXTRACT after browsing
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            ✅ Ready - Enter URL and click BROWSE
        </div>
    </div>

    <script>
        let currentProxy = 'corsproxy';
        let currentUrl = 'https://www.cat3movie.club/category/vivamax/';
        let currentVideo = '';
        let currentLogo = '';
        let currentTitle = '';

        const proxies = {
            'corsproxy': 'https://corsproxy.io/?',
            'allorigins': 'https://api.allorigins.win/raw?url=',
            'thingproxy': 'https://thingproxy.freeboard.io/fetch/'
        };

        function setProxy(proxy) {
            currentProxy = proxy;
            document.querySelectorAll('.proxy-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateStatus(`✅ Proxy set to: ${proxy}`);
        }

        function browseSite() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            currentUrl = url;
            
            // Use Google CORS proxy to load the site
            let proxyUrl = 'https://cors-anywhere.herokuapp.com/' + url;
            
            // Load in iframe (try direct muna)
            document.getElementById('browserIframe').src = url;
            
            updateStatus(`🌐 Loading: ${url}`);
            
            // But we'll fetch via proxy for extraction
            fetchViaProxy(url);
        }

        function loadUrl(url) {
            document.getElementById('urlInput').value = url;
            browseSite();
        }

        async function fetchViaProxy(url) {
            try {
                let proxyUrl = proxies[currentProxy] + encodeURIComponent(url);
                let response = await fetch(proxyUrl);
                let html = await response.text();
                
                // Store for extraction
                window.currentPageHTML = html;
                updateStatus('✅ Page loaded for extraction');
            } catch (error) {
                console.log('Proxy fetch failed:', error);
            }
        }

        async function extractCurrent() {
            let url = document.getElementById('urlInput').value.trim();
            
            updateStatus('⏳ Extracting videos...');
            document.getElementById('extractContent').innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 20px;">⏳ Extracting...</div>';

            try {
                // Try to use stored HTML first
                let html = window.currentPageHTML;
                
                if (!html) {
                    // If no stored HTML, fetch via proxy
                    let proxyUrl = proxies[currentProxy] + encodeURIComponent(url);
                    let response = await fetch(proxyUrl);
                    html = await response.text();
                }
                
                extractFromHTML(html);
            } catch (error) {
                // If all fails, show manual method
                document.getElementById('extractContent').innerHTML = `
                    <div style="color:#ef4444; padding:15px; text-align:center;">
                        ❌ Cannot auto-extract<br>
                        <small>${error.message}</small><br><br>
                        <b>Manual Method:</b><br>
                        1. Right-click page → View Page Source<br>
                        2. Ctrl+A, Ctrl+C<br>
                        3. Paste below:<br>
                        <textarea id="manualHTML" style="width:100%; height:150px; margin-top:10px; background:#333; color:#0ff; border:1px solid #666; padding:10px;"></textarea><br>
                        <button class="btn btn-primary" onclick="processManual()">Process HTML</button>
                    </div>
                `;
            }
        }

        function extractFromHTML(html) {
            let extractDiv = document.getElementById('extractContent');
            let output = '';

            // Reset
            currentVideo = '';
            currentLogo = '';
            currentTitle = '';

            // Find all video files
            let videoPatterns = [
                { pattern: /file:\s*["']([^"']+\.m3u8[^"']*)["']/g, type: 'm3u8' },
                { pattern: /(https?:[^"'\s]+\.m3u8[^"'\s]*)/g, type: 'm3u8' },
                { pattern: /file:\s*["']([^"']+\.mp4[^"']*)["']/g, type: 'mp4' },
                { pattern: /(https?:[^"'\s]+\.mp4[^"'\s]*)/g, type: 'mp4' },
                { pattern: /sources:\s*\[\s*\{[^}]*file:\s*["']([^"']+)["']/g, type: 'jwplayer' },
                { pattern: /(https?:[^"'\s]*sooplive[^"'\s]+\.(m3u8|mp4)[^"'\s]*)/g, type: 'sooplive' },
                { pattern: /(https?:[^"'\s]*bigo[^"'\s]+\.mp4[^"'\s]*)/g, type: 'bigo' }
            ];

            let allVideos = [];

            videoPatterns.forEach(({pattern, type}) => {
                let matches = [...html.matchAll(pattern)];
                matches.forEach(match => {
                    let url = match[1] || match[0];
                    if (url && !allVideos.some(v => v.url === url)) {
                        allVideos.push({ url, type });
                    }
                });
            });

            if (allVideos.length > 0) {
                output += '<div class="video-found">';
                output += '<div style="color:#4ade80; font-weight:bold; margin-bottom:10px;">🎥 VIDEO FOUND</div>';
                
                allVideos.forEach((video, index) => {
                    let badgeClass = video.type === 'm3u8' ? 'badge-m3u8' : 'badge-mp4';
                    if (index === 0) currentVideo = video.url;
                    
                    output += `<div style="margin-bottom:10px; padding:5px; background:rgba(0,0,0,0.2); border-radius:5px;">`;
                    output += `<span class="badge ${badgeClass}">${video.type}</span>`;
                    output += `<div class="video-link">${video.url}</div>`;
                    output += `</div>`;
                });
                output += '</div>';
            }

            // Find TMDB Logo
            let logoPattern = /https:\/\/image\.tmdb\.org\/[^"'\s]+/g;
            let logos = html.match(logoPattern);
            if (logos && logos.length > 0) {
                currentLogo = logos[0];
                output += '<div class="logo-found">';
                output += '<div style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">🖼️ LOGO FOUND</div>';
                output += `<img src="${currentLogo}" class="logo-preview" onerror="this.style.display='none'">`;
                output += `<div class="video-link" style="color:#fbbf24;">${currentLogo}</div>`;
                output += '</div>';
            }

            // Find Title
            let titleMatch = html.match(/<title>(.+?)<\/title>/);
            if (titleMatch) {
                currentTitle = titleMatch[1].replace(/ \| Cat3Movie.*$/, '').trim();
            }

            // Generate M3U
            if (currentVideo) {
                let logoTag = currentLogo ? ` tvg-logo="${currentLogo}"` : '';
                let m3uContent = `#EXTM3U\n#EXTINF:-1${logoTag},${currentTitle || 'Movie'}\n${currentVideo}`;
                
                output += '<div class="m3u-output">';
                output += '<div class="m3u-header">📀 GENERATED M3U</div>';
                output += `<div class="m3u-content" id="m3uContent">${m3uContent}</div>`;
                output += '<div class="btn-group">';
                output += '<button class="btn btn-primary" onclick="downloadM3U()">⬇️ DOWNLOAD</button>';
                output += '<button class="btn btn-success" onclick="copyM3U()">📋 COPY</button>';
                output += '</div>';
                output += '</div>';
            }

            extractDiv.innerHTML = output || '<div style="color:rgba(255,255,255,0.5); padding:20px; text-align:center;">❌ No videos found</div>';
            updateStatus('✅ Extraction complete');
        }

        function processManual() {
            let html = document.getElementById('manualHTML').value;
            if (html) {
                extractFromHTML(html);
            }
        }

        function downloadM3U() {
            let m3uContent = document.getElementById('m3uContent').textContent;
            let filename = (currentTitle || 'movie').toLowerCase().replace(/[^a-z0-9]+/g, '_') + '.m3u';
            
            let blob = new Blob([m3uContent], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            updateStatus('✅ M3U downloaded');
        }

        function copyM3U() {
            let m3uContent = document.getElementById('m3uContent').textContent;
            navigator.clipboard.writeText(m3uContent);
            updateStatus('✅ M3U copied');
        }

        function updateStatus(msg) {
            document.getElementById('statusBar').innerHTML = msg;
        }

        // Load initial page
        window.onload = function() {
            browseSite();
        };
    </script>
</body>
</html>
