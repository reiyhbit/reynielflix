<!DOCTYPE html>
<html>
<head>
    <title>Cat3Movie M3U8 Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .browser-container {
            max-width: 1200px;
            margin: 20px auto;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #4a4a6a;
        }
        .browser-header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 2px solid #e94560;
        }
        .browser-title {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .url-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #0f3460;
            border-radius: 8px;
            padding: 5px;
        }
        .url-input {
            flex: 1;
            padding: 12px 15px;
            background: #1a1a2e;
            border: 1px solid #4a4a6a;
            border-radius: 5px;
            color: #fff;
            font-size: 15px;
        }
        .url-input:focus {
            outline: none;
            border-color: #e94560;
        }
        .nav-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn:hover {
            background: #ff6b8b;
        }
        .browser-content {
            display: flex;
            height: 600px;
        }
        .source-panel {
            width: 50%;
            background: #0f0f1f;
            border-right: 2px solid #4a4a6a;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            background: #16213e;
            padding: 10px 15px;
            color: #e94560;
            font-weight: bold;
            border-bottom: 1px solid #4a4a6a;
        }
        .source-content {
            flex: 1;
            padding: 15px;
            overflow: auto;
            font-family: monospace;
            font-size: 13px;
            color: #0ff;
            background: #0a0a1a;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .extract-panel {
            width: 50%;
            background: #0f0f1f;
            display: flex;
            flex-direction: column;
        }
        .extract-content {
            flex: 1;
            padding: 15px;
            overflow: auto;
        }
        .m3u8-found {
            background: #16213e;
            border-left: 4px solid #4ade80;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .m3u8-link {
            color: #4ade80;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            margin: 10px 0;
            padding: 10px;
            background: #0a0a1a;
            border-radius: 5px;
        }
        .logo-found {
            background: #16213e;
            border-left: 4px solid #fbbf24;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .logo-preview {
            max-width: 150px;
            max-height: 200px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #fbbf24;
        }
        .logo-url {
            color: #fbbf24;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            background: #0a0a1a;
            padding: 10px;
            border-radius: 5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        .status-bar {
            background: #16213e;
            padding: 8px 15px;
            color: #94a3b8;
            font-size: 13px;
            border-top: 1px solid #4a4a6a;
        }
        .highlight {
            background: #e94560;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="browser-header">
            <div class="browser-title">🎬 Cat3Movie M3U8 Browser</div>
            <div class="url-bar">
                <span style="color:#94a3b8;">view-source:</span>
                <input type="text" class="url-input" id="urlInput" placeholder="https://www.cat3movie.club/movie-name/" value="https://www.cat3movie.club/kinsenas-katapusan-2022/">
                <button class="nav-btn" onclick="loadPage()">GO</button>
            </div>
        </div>
        
        <div class="browser-content">
            <!-- Left Panel: View Source -->
            <div class="source-panel">
                <div class="panel-header">
                    📄 VIEW SOURCE | <span style="color:#4ade80;">Ctrl+F para hanapin ang "m3u8"</span>
                </div>
                <div class="source-content" id="sourceContent">
                    Loading...
                </div>
            </div>
            
            <!-- Right Panel: Auto Extract -->
            <div class="extract-panel">
                <div class="panel-header">
                    🔍 AUTO-EXTRACTED | <span style="color:#fbbf24;">M3U8 + LOGO</span>
                </div>
                <div class="extract-content" id="extractContent">
                    <div style="color:#94a3b8; text-align:center; margin-top:50px;">
                        ⚡ Maghintay habang naglo-load ang page...
                    </div>
                </div>
            </div>
        </div>
        
        <div class="status-bar" id="statusBar">
            ✅ Ready | I-paste ang movie link at i-click GO
        </div>
    </div>

    <script>
        // Database ng mga kilalang patterns
        const patterns = {
            m3u8: /(https?:[^"'\s]+\.m3u8[^"'\s]*)/g,
            logo: /(https?:[^"'\s]+\.(jpg|jpeg|png|webp)[^"'\s]*)/g,
            tmdbLogo: /https:\/\/image\.tmdb\.org\/[^"'\s]+/g,
            sooplive: /(https?:[^"'\s]*sooplive[^"'\s]*\.m3u8[^"'\s]*)/g,
            bigo: /(https?:[^"'\s]*bigo[^"'\s]*\.mp4[^"'\s]*)/g
        };

        async function loadPage() {
            let url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            // Update status
            document.getElementById('statusBar').innerHTML = '⏳ Loading page source...';
            document.getElementById('sourceContent').innerHTML = '⏳ Fetching page source...';
            document.getElementById('extractContent').innerHTML = '<div style="color:#94a3b8; text-align:center; margin-top:50px;">⏳ Extracting M3U8 and logo...</div>';

            try {
                // Use a CORS proxy to fetch the page
                let proxy = 'https://api.allorigins.win/raw?url=';
                let response = await fetch(proxy + encodeURIComponent(url));
                let html = await response.text();
                
                // Display source
                displaySource(html);
                
                // Auto-extract
                extractAll(html, url);
                
                document.getElementById('statusBar').innerHTML = '✅ Page loaded successfully | Found: ' + 
                    countMatches(html, patterns.m3u8) + ' M3U8 | ' + 
                    countMatches(html, patterns.logo) + ' images';
                    
            } catch (error) {
                document.getElementById('sourceContent').innerHTML = '❌ Error loading page: ' + error;
                document.getElementById('extractContent').innerHTML = '<div style="color:#ef4444; text-align:center; margin-top:50px;">❌ Failed to load page</div>';
                document.getElementById('statusBar').innerHTML = '❌ Error: ' + error.message;
            }
        }

        function displaySource(html) {
            // Format HTML for display
            let formatted = html
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/(https?:[^"'\s]+\.m3u8[^"'\s]*)/g, '<span style="background:#4ade80; color:#000; padding:2px;">$1</span>')
                .replace(/(https?:[^"'\s]*sooplive[^"'\s]*)/g, '<span style="background:#fbbf24; color:#000; padding:2px;">$1</span>');
            
            document.getElementById('sourceContent').innerHTML = formatted;
        }

        function extractAll(html, pageUrl) {
            let extractDiv = document.getElementById('extractContent');
            let output = '';

            // Extract M3U8 links
            let m3u8Matches = [...html.matchAll(patterns.m3u8)];
            let uniqueM3u8 = [...new Set(m3u8Matches.map(m => m[0]))];
            
            if (uniqueM3u8.length > 0) {
                output += '<div class="m3u8-found">';
                output += '<div style="color:#4ade80; font-weight:bold; margin-bottom:10px;">🎥 M3U8 FOUND</div>';
                
                uniqueM3u8.forEach((link, index) => {
                    output += `<div class="m3u8-link" id="m3u8_${index}">${link}</div>`;
                });
                
                output += '<div class="btn-group">';
                output += `<button class="btn btn-primary" onclick="copyM3U8('${uniqueM3u8[0]}')">📋 Copy First M3U8</button>`;
                output += `<button class="btn btn-success" onclick="downloadM3U('${uniqueM3u8[0]}')">⬇️ Download .m3u</button>`;
                output += '</div>';
                output += '</div>';
            } else {
                output += '<div class="m3u8-found" style="border-left-color:#ef4444;">';
                output += '<div style="color:#ef4444; font-weight:bold;">❌ NO M3U8 FOUND</div>';
                output += '<div style="color:#94a3b8; margin-top:10px;">Try searching manually sa source (Ctrl+F) for: m3u8, manifest, playlist</div>';
                output += '</div>';
            }

            // Extract Logo
            let logoMatches = [...html.matchAll(patterns.logo)];
            let uniqueLogos = [...new Set(logoMatches.map(m => m[0]))];
            
            // Filter for TMDB logos (mas maganda)
            let tmdbLogos = uniqueLogos.filter(logo => logo.includes('tmdb') || logo.includes('themoviedb'));
            
            if (tmdbLogos.length > 0) {
                output += '<div class="logo-found">';
                output += '<div style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">🖼️ LOGO FOUND</div>';
                output += `<img src="${tmdbLogos[0]}" class="logo-preview" onerror="this.style.display='none'">`;
                output += `<div class="logo-url">${tmdbLogos[0]}</div>`;
                output += '<button class="btn btn-warning" style="margin-top:10px;" onclick="copyLogo(\'' + tmdbLogos[0] + '\')">📋 Copy Logo URL</button>';
                output += '</div>';
            } else if (uniqueLogos.length > 0) {
                output += '<div class="logo-found">';
                output += '<div style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">🖼️ LOGO FOUND</div>';
                output += `<img src="${uniqueLogos[0]}" class="logo-preview" onerror="this.style.display='none'">`;
                output += `<div class="logo-url">${uniqueLogos[0]}</div>`;
                output += '<button class="btn btn-warning" style="margin-top:10px;" onclick="copyLogo(\'' + uniqueLogos[0] + '\')">📋 Copy Logo URL</button>';
                output += '</div>';
            }

            // Add movie info
            output += '<div style="background:#16213e; padding:15px; border-radius:5px; margin-top:15px;">';
            output += '<div style="color:#94a3b8; margin-bottom:5px;">📌 Movie Info</div>';
            
            // Try to get title
            let titleMatch = html.match(/<title>(.+?)<\/title>/);
            if (titleMatch) {
                output += `<div style="color:#fff;">${titleMatch[1]}</div>`;
            }
            
            output += '</div>';

            extractDiv.innerHTML = output;
        }

        function countMatches(html, pattern) {
            let matches = html.match(pattern);
            return matches ? matches.length : 0;
        }

        function copyM3U8(link) {
            navigator.clipboard.writeText(link);
            document.getElementById('statusBar').innerHTML = '✅ M3U8 link copied to clipboard!';
        }

        function copyLogo(logo) {
            navigator.clipboard.writeText(logo);
            document.getElementById('statusBar').innerHTML = '✅ Logo URL copied to clipboard!';
        }

        function downloadM3U(m3u8Link) {
            let title = document.querySelector('.logo-found')?.previousElementSibling?.textContent || 'movie';
            let m3uContent = `#EXTM3U\n#EXTINF:-1,${title}\n${m3u8Link}`;
            
            let blob = new Blob([m3uContent], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'movie.m3u';
            a.click();
            
            document.getElementById('statusBar').innerHTML = '✅ M3U file downloaded!';
        }

        // Load default page
        window.onload = function() {
            loadPage();
        };
    </script>
</body>
</html>
