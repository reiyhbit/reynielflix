<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Stream Grid Player (HLS.js + Shaka)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #0e0e12;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f0f0f0;
            padding: 20px;
        }
        .app-container {
            max-width: 1400px;
            width: 100%;
        }
        h1 {
            font-weight: 400;
            font-size: 2rem;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            color: #ff7b9c;
            border-left: 6px solid #ff3b6f;
            padding-left: 18px;
        }
        .subhead {
            color: #aaa;
            margin-top: 0;
            margin-bottom: 30px;
            font-style: italic;
            font-size: 0.95rem;
            padding-left: 24px;
        }
        /* GRID */
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }
        /* CARD */
        .stream-card {
            background: #1e1e28;
            border-radius: 22px;
            padding: 18px 8px 12px 8px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 2px solid transparent;
            box-shadow: 0 8px 18px rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }
        .stream-card:hover {
            transform: scale(1.02);
            border-color: #ff5777;
            background: #262636;
            box-shadow: 0 12px 24px #b3002d30;
        }
        .stream-card.active {
            border-color: #ff1744;
            background: #2d1e28;
            box-shadow: 0 0 0 3px #ff174450;
        }
        .logo-wrapper {
            width: 100px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            background: #2b2b3a;
            border-radius: 16px;
            padding: 10px 0;
            box-shadow: inset 0 0 0 1px #3f3f55;
        }
        .stream-logo {
            max-width: 90px;
            max-height: 120px;
            border-radius: 12px;
            object-fit: contain;
            background: transparent;
            transition: opacity 0.2s;
            box-shadow: 0 4px 10px black;
        }
        .stream-title {
            font-size: 0.86rem;
            font-weight: 600;
            line-height: 1.3;
            max-width: 140px;
            color: #fbd5df;
            margin: 4px 0 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 2px 3px black;
        }
        .badge {
            background: #2f2f42;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            color: #cfcfec;
            margin-top: 6px;
            border: 1px solid #4c4c70;
        }
        /* PLAYER SECTION */
        .player-section {
            background: #0b0b12;
            border-radius: 40px;
            padding: 24px 24px 30px;
            border: 1px solid #3a2a32;
            box-shadow: 0 20px 30px #00000080;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000000;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 0 30px #ff174430;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #0b0f12;
            outline: none;
        }
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 8px 6px;
        }
        .now-playing {
            font-weight: 500;
            background: #23222f;
            padding: 6px 22px;
            border-radius: 60px;
            border-left: 4px solid #ff3b6f;
            font-size: 1.1rem;
        }
        .library-link {
            color: #adadff;
            text-decoration: none;
            font-size: 0.9rem;
            background: #1c1c28;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #4b3b50;
        }
        .library-link:hover {
            background: #2d2d40;
        }
        .error-message {
            color: #ffa6b0;
            background: #4a1e2a;
            border-radius: 40px;
            padding: 10px 25px;
            margin-top: 15px;
            border: 1px solid #ff6b7c;
            font-size: 0.95rem;
            display: inline-block;
        }
        .loading-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffc2d0;
            border-top-color: #ff1744;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer {
            margin-top: 30px;
            opacity: 0.6;
            font-size: 0.8rem;
        }
        /* scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a24; }
        ::-webkit-scrollbar-thumb { background: #ff3b6f; border-radius: 8px; }
    </style>
    <!-- Shaka and HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.compiled.js"></script>
</head>
<body>
<div class="app-container">
    <h1>🎬 VIVA GRID · HLS / SHAKA</h1>
    <div class="subhead">⚡ mula sa iyong playlist · i-click ang poster para ipalabas</div>

    <!-- DYNAMIC GRID -->
    <div id="streamGrid" class="stream-grid">Loading stream catalog...</div>

    <!-- PLAYER PANEL -->
    <div class="player-section">
        <div class="video-container">
            <video id="videoPlayer" controls autoplay playsinline poster="https://via.placeholder.com/640x360/1e1e2f/ff6b8b?text=VIVA+stream"></video>
        </div>
        <div class="player-info">
            <span id="nowPlayingLabel" class="now-playing">⏸️ pumili ng video</span>
            <a class="library-link" href="#" id="m3uSourceLink" target="_blank">📋 raw playlist</a>
        </div>
        <div id="playerStatus" class="error-message" style="display: none;"></div>
    </div>
    <footer>⚙️ grid gamit ang logo mula sa iyong M3U · HLS.js + Shaka fallback</footer>
</div>

<script>
    (function() {
        // --- configuration ---
        const M3U_URL = 'https://raw.githubusercontent.com/reiyhbit/iptv/refs/heads/main/viva.m3u';

        // --- DOM elements ---
        const gridEl = document.getElementById('streamGrid');
        const video = document.getElementById('videoPlayer');
        const nowPlayingEl = document.getElementById('nowPlayingLabel');
        const statusEl = document.getElementById('playerStatus');
        const sourceLink = document.getElementById('m3uSourceLink');
        sourceLink.href = M3U_URL;

        // --- global player state ---
        let currentPlaylist = [];            // array of { name, logo, url }
        let hls = null;                      // HLS.js instance
        let shakaPlayer = null;               // Shaka Player instance

        // --- helper: hide status, show temporary message ---
        function setStatus(msg, isError = true) {
            if (!msg) {
                statusEl.style.display = 'none';
                statusEl.innerHTML = '';
                return;
            }
            statusEl.style.display = 'inline-block';
            statusEl.innerHTML = isError ? `❌ ${msg}` : `⏳ ${msg}`;
        }

        // --- destroy previous players cleanly ---
        function destroyPlayers() {
            if (hls) {
                try { hls.destroy(); } catch (e) {}
                hls = null;
            }
            if (shakaPlayer) {
                try { shakaPlayer.destroy(); } catch (e) {}
                shakaPlayer = null;
            }
            // remove all sources
            video.removeAttribute('src');
            video.load();
        }

        // --- load and parse M3U ---
        async function loadPlaylist() {
            setStatus('⏬ kinukuha ang playlist...', false);
            try {
                const resp = await fetch(M3U_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const m3uText = await resp.text();

                // simple parser: EXTINF lines contain logo and title, next line is URL
                const lines = m3uText.split('\n');
                const items = [];
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        // extract tvg-logo="..."
                        let logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                        let logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150x220/2a2a3a/ff6f91?text=no+logo';

                        // title: after last comma, but clean quotes
                        let title = line.split(',').pop()?.trim() || 'untitled';
                        title = title.replace(/"/g, '');

                        // next non-empty line that does NOT start with #
                        let urlLine = '';
                        for (let j = i + 1; j < lines.length; j++) {
                            const next = lines[j].trim();
                            if (next && !next.startsWith('#')) {
                                urlLine = next;
                                i = j; // advance index
                                break;
                            }
                        }
                        if (urlLine) {
                            items.push({
                                name: title,
                                logo: logo,
                                url: urlLine
                            });
                        }
                    }
                }

                if (items.length === 0) throw new Error('walang nakitang entry sa playlist');
                currentPlaylist = items;
                renderGrid(items);
                setStatus(''); // clear status
            } catch (err) {
                console.error(err);
                gridEl.innerHTML = `❌ Hindi ma-load ang playlist: ${err.message}. <button onclick="location.reload()">↻ subukan muli</button>`;
                setStatus('', false);
            }
        }

        // --- render grid with logos ---
        function renderGrid(items) {
            if (!items.length) {
                gridEl.innerHTML = '<div class="error-message">walang laman ang playlist</div>';
                return;
            }
            let html = '';
            items.forEach((item, index) => {
                // fallback logo kung walang makuha
                const logoSrc = item.logo || 'https://via.placeholder.com/150x220/333344/ff99aa?text=VIVA';
                html += `
                    <div class="stream-card" data-index="${index}" title="${item.name.replace(/"/g, '&quot;')}">
                        <div class="logo-wrapper">
                            <img class="stream-logo" src="${logoSrc}" alt="logo" loading="lazy" onerror="this.src='https://via.placeholder.com/100x140/2a1f2a/ffa5b9?text=🎬'; this.style.objectFit='contain';">
                        </div>
                        <div class="stream-title">${item.name}</div>
                        <div class="badge">VOD</div>
                    </div>
                `;
            });
            gridEl.innerHTML = html;

            // attach click listeners
            document.querySelectorAll('.stream-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const index = card.dataset.index;
                    if (index !== undefined) playStream(parseInt(index), card);
                });
            });
        }

        // --- play selected stream (HLS.js or Shaka) ---
        async function playStream(index, cardElement) {
            const stream = currentPlaylist[index];
            if (!stream) return;

            // update UI: remove active class from all cards
            document.querySelectorAll('.stream-card').forEach(c => c.classList.remove('active'));
            if (cardElement) cardElement.classList.add('active');

            nowPlayingEl.innerHTML = `📺 ${stream.name.substring(0, 50)}`;
            setStatus('⏳ sinisimulan ang player...', false);

            // kill old players
            destroyPlayers();

            // detect kung HLS native vs. HLS.js / shaka
            const streamUrl = stream.url;

            // kung .m3u8 ang extension o manifest? attempt HLS.js muna
            const isHls = streamUrl.includes('.m3u8') || streamUrl.includes('manifest');

            try {
                if (isHls && Hls.isSupported()) {
                    // gamitin HLS.js
                    hls = new Hls({
                        maxBufferLength: 30,
                        enableWorker: true,
                    });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(e => console.log('autoplay prevented', e));
                        setStatus('');
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            setStatus('HLS error: ' + data.type);
                            console.error('HLS error', data);
                        }
                    });
                } else if (shakaPlayer?.isSupported() ?? shaka.Player.isSupported()) {
                    // shaka fallback (for .mp4 or weird hls)
                    if (!shakaPlayer) {
                        shakaPlayer = new shaka.Player(video);
                        shakaPlayer.addEventListener('error', (e) => {
                            setStatus('Shaka error: ' + e.detail);
                        });
                    }
                    await shakaPlayer.load(streamUrl);
                    video.play().catch(e => console.log('autoplay blocked'));
                    setStatus('');
                } else {
                    // native play (pang .mp4 direct atbp)
                    video.src = streamUrl;
                    video.load();
                    video.play().catch(e => setStatus('pindutin ang play ▶️'));
                    setStatus('');
                }
            } catch (err) {
                setStatus('nabigo ang pag-load: ' + err.message);
                console.error(err);
                // fallback: direct source baka gumana
                video.src = streamUrl;
                video.load();
            }
        }

        // --- initialize shaka, load playlist ---
        window.addEventListener('load', () => {
            // init shaka globally if supported
            if (shaka.Player.isSupported()) {
                shakaPlayer = new shaka.Player(video);
                shakaPlayer.configure({ manifest: { retryParameters: { maxAttempts: 3 } } });
            } else {
                console.warn('Shaka not supported, relying on HLS.js/native');
            }
            loadPlaylist();
        });

        // extra: pag na-click ang active pero gusto ireload?
        // pindot na lang ulit sa ibang card

    })();
</script>
</body>
</html>
