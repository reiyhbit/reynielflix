<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Web App</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#141414;
}

.logo { font-size:20px; font-weight:bold; }

.search-box input {
  padding:7px;
  border-radius:5px;
  border:none;
}

/* CATEGORY BAR */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  background:#1c1c1c;
}

.category {
  padding:6px 15px;
  margin-right:8px;
  background:#333;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.category.active {
  background:#e50914;
}

/* SLIDER */
.slider {
  height:250px;
  position:relative;
  overflow:hidden;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1s;
}

.slide.active { opacity:1; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  position:relative;
}

.card:hover { transform:scale(1.08); }

.card img {
  width:100%;
  height:130px;
  object-fit:contain;
  background:black;
}

.card-title {
  padding:6px;
  font-size:13px;
  text-align:center;
}

.fav {
  position:absolute;
  top:5px;
  right:5px;
  font-size:18px;
  cursor:pointer;
}

/* PLAYER */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.video-container {
  width:90%;
  max-width:1100px;
  position:relative;
  background:#000;
}

video {
  width:100%;
  display:block;
}

/* Theater Mode */
.theater-mode .video-container {
  max-width:100%;
  width:100%;
}

.theater-mode .close-btn {
  position:fixed;
  bottom:20px;
  right:20px;
}

/* Player Controls Overlay */
.player-controls {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(0,0,0,0.8);
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  opacity:0;
  transition:0.3s;
}

.video-container:hover .player-controls {
  opacity:1;
}

.quality-btn, .theater-btn {
  background:#e50914;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:3px;
  cursor:pointer;
  margin:0 2px;
  font-size:12px;
}

.quality-menu {
  position:absolute;
  bottom:40px;
  left:10px;
  background:#141414;
  border-radius:5px;
  display:none;
  flex-direction:column;
  min-width:100px;
  border:1px solid #333;
}

.quality-menu.show {
  display:flex;
}

.quality-option {
  padding:8px 12px;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}

.quality-option:hover {
  background:#e50914;
}

.quality-option.active {
  background:#e50914;
  font-weight:bold;
}

.resume-badge {
  background:#e50914;
  color:white;
  padding:3px 8px;
  border-radius:15px;
  font-size:11px;
  position:absolute;
  top:5px;
  left:5px;
  z-index:2;
}

.close-btn {
  margin-top:10px;
  padding:8px 15px;
  background:red;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.buffering-indicator {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.7);
  color:white;
  padding:5px 15px;
  border-radius:20px;
  font-size:12px;
  display:none;
  z-index:10;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">reynielflix</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search channel...">
  </div>
</div>

<div class="categories" id="categories"></div>
<div class="slider" id="slider"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="video-container">
    <video id="videoPlayer" controls autoplay preload="auto"></video>
    <div class="buffering-indicator" id="bufferingIndicator">Buffering ⚡</div>
    <div class="player-controls">
      <div style="position:relative">
        <button class="quality-btn" onclick="toggleQualityMenu()">⚙️ Auto</button>
        <div class="quality-menu" id="qualityMenu">
          <div class="quality-option active" onclick="setQuality('auto')">Auto</div>
          <div class="quality-option" onclick="setQuality('1080p')">1080p</div>
          <div class="quality-option" onclick="setQuality('720p')">720p</div>
          <div class="quality-option" onclick="setQuality('480p')">480p</div>
        </div>
      </div>
      <div>
        <button class="theater-btn" onclick="toggleTheaterMode()">🌙 Theater</button>
      </div>
    </div>
  </div>
  <button class="close-btn" onclick="closePlayer()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.4.0/shaka-player.compiled.js"></script>

<script>
let channels=[];
let currentCategory="All";
let favorites=JSON.parse(localStorage.getItem("favorites"))||[];
let hlsInstance = null;
let currentVideoUrl = "";
let currentVideoName = "";
let bufferingTimer = null;

(async function(){
const url="https://Niel01581.github.io/secret/viva.m3u";
const text=await fetch(url).then(r=>r.text());
const lines=text.split("\n");

for(let i=0;i<lines.length;i++){
 if(lines[i].startsWith("#EXTINF")){
  let name=lines[i].split(",")[1]||"Unknown";
  let logoMatch=lines[i].match(/tvg-logo="([^"]+)"/);
  let groupMatch=lines[i].match(/group-title="([^"]+)"/);
  let logo=logoMatch?logoMatch[1]:"https://via.placeholder.com/150x120";
  let group=groupMatch?groupMatch[1]:"Others";
  let stream=lines[i+1]||"";
  channels.push({name,logo,group,stream});
 }
}

buildCategories();
buildSlider();
renderGrid();
checkResumePosition();
})();

/* CATEGORY */
function buildCategories(){
let cats=["All","Favorites",...new Set(channels.map(c=>c.group))];
let container=document.getElementById("categories");
cats.forEach(cat=>{
 let div=document.createElement("div");
 div.className="category";
 div.textContent=cat;
 if(cat==="All") div.classList.add("active");
 div.onclick=()=>{
  document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
  div.classList.add("active");
  currentCategory=cat;
  renderGrid();
 };
 container.appendChild(div);
});
}

/* SLIDER */
function buildSlider(){
let slider=document.getElementById("slider");
channels.slice(0,5).forEach((c,i)=>{
 let slide=document.createElement("div");
 slide.className="slide";
 slide.style.backgroundImage=`url('${c.logo}')`;
 if(i===0) slide.classList.add("active");
 slider.appendChild(slide);
});
let index=0;
setInterval(()=>{
 let slides=document.querySelectorAll(".slide");
 slides[index].classList.remove("active");
 index=(index+1)%slides.length;
 slides[index].classList.add("active");
},4000);
}

/* GRID */
function renderGrid(){
let grid=document.getElementById("grid");
grid.innerHTML="";
let search=document.getElementById("searchInput").value.toLowerCase();

channels
.filter(c=>{
 if(currentCategory==="Favorites") return favorites.includes(c.name);
 if(currentCategory==="All") return true;
 return c.group===currentCategory;
})
.filter(c=>c.name.toLowerCase().includes(search))
.forEach(c=>{
 let card=document.createElement("div");
 card.className="card";
 
 // Check if this channel has resume position
 let resumePos = localStorage.getItem(`resume_${c.name}`);
 let resumeBadge = resumePos ? '<div class="resume-badge">▶️ Resume</div>' : '';
 
 card.innerHTML=`
  ${resumeBadge}
  <div class="fav">${favorites.includes(c.name)?"⭐":"☆"}</div>
  <img src="${c.logo}">
  <div class="card-title">${c.name}</div>
 `;
 card.querySelector(".fav").onclick=(e)=>{
  e.stopPropagation();
  toggleFavorite(c.name);
 };
 card.onclick=()=>playChannel(c.stream,c.name);
 grid.appendChild(card);
});
}

/* SEARCH */
document.getElementById("searchInput").oninput=renderGrid;

/* FAVORITES */
function toggleFavorite(name){
 if(favorites.includes(name)){
  favorites=favorites.filter(f=>f!==name);
 } else favorites.push(name);
 localStorage.setItem("favorites",JSON.stringify(favorites));
 renderGrid();
}

/* BUFFERING INDICATOR */
function setupBufferingListener(video) {
  video.addEventListener('waiting', () => {
    document.getElementById('bufferingIndicator').style.display = 'block';
  });
  
  video.addEventListener('playing', () => {
    document.getElementById('bufferingIndicator').style.display = 'none';
  });
  
  video.addEventListener('canplay', () => {
    document.getElementById('bufferingIndicator').style.display = 'none';
  });
}

/* PLAYER - Updated with new features */
function playChannel(url,name){
 localStorage.setItem("lastWatched",name);
 currentVideoUrl = url;
 currentVideoName = name;
 
 let overlay=document.getElementById("overlay");
 let video=document.getElementById("videoPlayer");
 
 // Clean up previous HLS instance
 if (hlsInstance) {
   hlsInstance.destroy();
   hlsInstance = null;
 }
 
 overlay.style.display="flex";
 
 // Add theater mode class if it was enabled
 if (localStorage.getItem('theaterMode') === 'true') {
   overlay.classList.add('theater-mode');
 }
 
 setupBufferingListener(video);
 
 // Faster loading with preload
 video.preload = 'auto';
 
 // Check if there's a saved position
 let savedTime = localStorage.getItem(`resume_${name}`);
 if (savedTime) {
   video.addEventListener('loadedmetadata', function onMetadata() {
     video.currentTime = parseFloat(savedTime);
     video.removeEventListener('loadedmetadata', onMetadata);
   });
 }
 
 // Save position periodically
 video.addEventListener('timeupdate', () => {
   if (video.currentTime > 30) { // Save after 30 seconds
     localStorage.setItem(`resume_${name}`, video.currentTime);
   }
 });
 
 // Auto quality selection based on network speed
 if (navigator.connection) {
   let connection = navigator.connection;
   let effectiveType = connection.effectiveType;
   
   if (effectiveType === 'slow-2g' || effectiveType === '2g') {
     setQuality('480p');
   } else if (effectiveType === '3g') {
     setQuality('720p');
   } else {
     setQuality('auto');
   }
 }
 
 // Check if it's an MP4 file
 let isMp4 = url.toLowerCase().includes('.mp4') || 
              url.toLowerCase().includes('.mkv') || 
              url.toLowerCase().includes('.avi') ||
              url.toLowerCase().includes('.mov') ||
              url.match(/\.(mp4|mkv|avi|mov|webm|m4v)(\?.*)?$/i);
 
 // Check if it's HLS (m3u8)
 let isHls = url.toLowerCase().includes('.m3u8') || 
             url.match(/\.m3u8(\?.*)?$/i);
 
 if (isHls) {
   // HLS playback with quality control
   if (Hls.isSupported()) {
     let hls = new Hls({
       maxBufferLength: 60, // Faster buffering
       maxMaxBufferLength: 120,
       startLevel: -1 // Auto quality
     });
     
     hls.loadSource(url);
     hls.attachMedia(video);
     hlsInstance = hls;
     
     // Quality levels available
     hls.on(Hls.Events.MANIFEST_PARSED, function() {
       let qualityMenu = document.getElementById('qualityMenu');
       let levels = hls.levels;
       
       // Clear existing options except Auto
       while (qualityMenu.children.length > 1) {
         qualityMenu.removeChild(qualityMenu.lastChild);
       }
       
       levels.forEach((level, index) => {
         let height = level.height;
         let option = document.createElement('div');
         option.className = 'quality-option';
         option.textContent = height + 'p';
         option.onclick = () => {
           setHlsQuality(index);
           document.querySelectorAll('.quality-option').forEach(opt => opt.classList.remove('active'));
           option.classList.add('active');
         };
         qualityMenu.appendChild(option);
       });
     });
     
   } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
     video.src = url;
   }
 } else if (isMp4) {
   // MP4 or direct video file playback
   video.src = url;
   video.load();
 } else {
   video.src = url;
   video.load();
 }
 
 video.requestFullscreen().catch(()=>{});
}

/* QUALITY CONTROL */
function toggleQualityMenu() {
  document.getElementById('qualityMenu').classList.toggle('show');
}

function setQuality(level) {
  document.getElementById('qualityMenu').classList.remove('show');
  
  if (hlsInstance) {
    if (level === 'auto') {
      hlsInstance.currentLevel = -1;
    } else if (level === '1080p') {
      hlsInstance.currentLevel = hlsInstance.levels.findIndex(l => l.height === 1080);
    } else if (level === '720p') {
      hlsInstance.currentLevel = hlsInstance.levels.findIndex(l => l.height === 720);
    } else if (level === '480p') {
      hlsInstance.currentLevel = hlsInstance.levels.findIndex(l => l.height === 480);
    }
  }
}

function setHlsQuality(level) {
  if (hlsInstance) {
    hlsInstance.currentLevel = level;
  }
}

/* THEATER MODE */
function toggleTheaterMode() {
  let overlay = document.getElementById('overlay');
  overlay.classList.toggle('theater-mode');
  let theaterMode = overlay.classList.contains('theater-mode');
  localStorage.setItem('theaterMode', theaterMode);
  
  // Update button text
  let btn = document.querySelector('.theater-btn');
  btn.textContent = theaterMode ? '🌙 Normal' : '🌙 Theater';
}

/* RESUME POSITION */
function checkResumePosition() {
  let lastWatched = localStorage.getItem('lastWatched');
  if (lastWatched) {
    console.log('Last watched:', lastWatched);
  }
}

function closePlayer(){
 let video=document.getElementById("videoPlayer");
 
 // Save final position before closing
 if (currentVideoName && video.currentTime > 30) {
   localStorage.setItem(`resume_${currentVideoName}`, video.currentTime);
 }
 
 video.pause();
 video.src="";
 document.getElementById('qualityMenu').classList.remove('show');
 document.getElementById('overlay').style.display="none";
 
 // Clean up HLS
 if (hlsInstance) {
   hlsInstance.destroy();
   hlsInstance = null;
 }
}

// Close quality menu when clicking outside
document.addEventListener('click', function(event) {
  let menu = document.getElementById('qualityMenu');
  let btn = document.querySelector('.quality-btn');
  if (!btn.contains(event.target) && !menu.contains(event.target)) {
    menu.classList.remove('show');
  }
});
</script>

</body>
</html>
