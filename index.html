<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-Style Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Netflix Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #141414;
            color: #fff;
            overflow-x: hidden;
        }

        /* Netflix-style header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            transition: background-color 0.3s ease;
        }

        .header.scrolled {
            background-color: #141414;
            background: linear-gradient(to bottom, #141414 0%, #141414 100%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo h1 {
            color: #e50914;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #b3b3b3;
        }

        .nav-links a.active {
            color: #fff;
            font-weight: 600;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile i {
            font-size: 20px;
            cursor: pointer;
            color: #fff;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Hero section with video player */
        .hero {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 600px;
            background-color: #000;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #video-player {
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* Custom video controls (Netflix style) */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            padding: 60px 40px 30px 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .hero:hover .custom-controls {
            opacity: 1;
            pointer-events: all;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #e50914;
            border-radius: 5px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background-color: #e50914;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .controls-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .control-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 2px;
        }

        .time-display {
            color: #fff;
            font-size: 14px;
            margin-left: auto;
        }

        /* Netflix-style content rows */
        .content {
            padding: 20px 40px;
        }

        .category-row {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e5e5e5;
        }

        .row-items {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .row-items::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 auto;
            width: 200px;
            height: 112px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: scale(1.4);
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 10px 10px 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .play-icon {
            color: #fff;
            font-size: 24px;
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
        }

        /* Loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #e50914;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(229, 9, 20, 0.9);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        /* Modal for playlist */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #181818;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #fff;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .playlist-items {
            max-height: 400px;
            overflow-y: auto;
        }

        .playlist-item {
            padding: 15px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .playlist-item:hover {
            background-color: #333;
        }

        .item-title {
            color: #fff;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .item-url {
            color: #999;
            font-size: 12px;
            word-break: break-all;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            
            .nav-links {
                display: none;
            }
            
            .content {
                padding: 15px 20px;
            }
            
            .hero {
                height: 50vh;
                min-height: 400px;
            }
            
            .card {
                width: 150px;
                height: 84px;
            }
        }
    </style>
    <!-- Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Add Shaka Player -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
</head>
<body>
    <!-- Netflix-style header -->
    <div class="header" id="header">
        <div class="logo">
            <h1>NETFLIX</h1>
            <div class="nav-links">
                <a href="#" class="active">Home</a>
                <a href="#">TV Shows</a>
                <a href="#">Movies</a>
                <a href="#">New & Popular</a>
                <a href="#">My List</a>
            </div>
        </div>
        <div class="user-profile">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
            <i class="fas fa-user-circle avatar"></i>
        </div>
    </div>

    <!-- Hero section with video player -->
    <div class="hero">
        <div class="video-container">
            <video id="video-player" poster="https://via.placeholder.com/1920x1080/1a1a1a/666666?text=Loading+Stream..."></video>
            
            <!-- Loading indicator -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading stream...</p>
            </div>

            <!-- Error message -->
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 10px;"></i>
                <p id="error-text">Failed to load stream</p>
                <button onclick="loadPlaylist()" style="margin-top: 15px; padding: 8px 20px; background-color: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer;">Retry</button>
            </div>

            <!-- Custom controls (Netflix style) -->
            <div class="custom-controls" id="custom-controls">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="controls-main">
                    <button class="control-btn" id="play-pause"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="volume-btn"><i class="fas fa-volume-up"></i></button>
                    <div class="volume-control">
                        <div class="volume-slider" id="volume-slider">
                            <div class="volume-fill" id="volume-fill" style="width: 100%;"></div>
                        </div>
                    </div>
                    <button class="control-btn" id="settings-btn"><i class="fas fa-cog"></i></button>
                    <button class="control-btn" id="fullscreen-btn"><i class="fas fa-expand"></i></button>
                    <div class="time-display" id="time-display">0:00 / 0:00</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Content rows (Netflix style) -->
    <div class="content">
        <div class="category-row">
            <h2 class="category-title">Trending Now</h2>
            <div class="row-items" id="trending-row"></div>
        </div>

        <div class="category-row">
            <h2 class="category-title">Continue Watching</h2>
            <div class="row-items" id="continue-row"></div>
        </div>

        <div class="category-row">
            <h2 class="category-title">Popular on Netflix</h2>
            <div class="row-items" id="popular-row"></div>
        </div>
    </div>

    <!-- Playlist modal -->
    <div class="modal" id="playlist-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Available Streams</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="playlist-items" id="playlist-items">
                <!-- Playlist items will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Initialize variables
        let player;
        let videoElement;
        let currentStreamUrl = '';
        let playlistData = [];
        let isPlaying = false;
        let isMuted = false;
        let currentVolume = 1;
        let isFullscreen = false;

        // Initialize Shaka Player
        async function initPlayer() {
            videoElement = document.getElementById('video-player');
            
            // Check if browser supports Shaka Player
            if (!shaka.Player.isBrowserSupported()) {
                showError('Browser not supported for Shaka Player');
                return;
            }

            // Create player instance
            player = new shaka.Player(videoElement);

            // Attach error handler
            player.addEventListener('error', onPlayerError);

            // Configure player
            player.configure({
                streaming: {
                    bufferingGoal: 30,
                    rebufferingGoal: 15,
                    bufferBehind: 30,
                    ignoreTextStreamFailures: true,
                    alwaysStreamText: false,
                    startAtSegmentBoundary: false,
                    fastSwitching: true,
                    accurateManifestUpdate: true
                },
                manifest: {
                    retryParameters: {
                        maxAttempts: 5,
                        baseDelay: 1000,
                        backoffFactor: 2,
                        fuzzFactor: 0.5,
                        timeout: 30000
                    }
                }
            });

            // Load the playlist
            loadPlaylist();
        }

        // Load M3U playlist
        async function loadPlaylist() {
            showLoading();
            hideError();
            
            try {
                const response = await fetch('https://reiyhbit.github.io/vv/');
                const m3uText = await response.text();
                
                // Parse M3U playlist
                playlistData = parseM3U(m3uText);
                
                if (playlistData.length > 0) {
                    // Load the first stream
                    await loadStream(playlistData[0].url);
                    // Populate content rows
                    populateContentRows();
                } else {
                    showError('No streams found in playlist');
                }
            } catch (error) {
                console.error('Error loading playlist:', error);
                showError('Failed to load playlist: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        // Parse M3U playlist
        function parseM3U(m3uText) {
            const lines = m3uText.split('\n');
            const items = [];
            let currentItem = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    // Parse EXTINF line
                    const infoMatch = line.match(/#EXTINF:([^,]*),(.*)/);
                    if (infoMatch) {
                        currentItem = {
                            duration: infoMatch[1].trim(),
                            title: infoMatch[2].trim(),
                            url: ''
                        };
                    }
                } else if (line && !line.startsWith('#')) {
                    // This is a URL
                    if (currentItem.title) {
                        currentItem.url = line;
                        items.push({...currentItem});
                        currentItem = {};
                    }
                }
            }

            return items;
        }

        // Load a stream
        async function loadStream(url) {
            if (!player) return;
            
            showLoading();
            hideError();
            
            try {
                await player.load(url);
                currentStreamUrl = url;
                
                // Update video info
                updateVideoInfo();
                
                // Start playing
                videoElement.play();
                isPlaying = true;
                updatePlayPauseIcon();
                
            } catch (error) {
                console.error('Error loading stream:', error);
                showError('Failed to load stream: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        // Player error handler
        function onPlayerError(event) {
            console.error('Player error:', event.detail);
            showError('Stream error: ' + event.detail.message);
        }

        // Update video information
        function updateVideoInfo() {
            // Update video title and other info in UI
            const videoTitle = playlistData.find(item => item.url === currentStreamUrl)?.title || 'Unknown Stream';
            document.querySelector('.hero').setAttribute('data-title', videoTitle);
        }

        // Populate content rows with playlist items
        function populateContentRows() {
            const trendingRow = document.getElementById('trending-row');
            const continueRow = document.getElementById('continue-row');
            const popularRow = document.getElementById('popular-row');

            // Clear existing content
            trendingRow.innerHTML = '';
            continueRow.innerHTML = '';
            popularRow.innerHTML = '';

            // Create cards for each playlist item
            playlistData.forEach((item, index) => {
                const card = createCard(item, index);
                
                // Distribute items across rows
                if (index < 5) {
                    trendingRow.appendChild(card.cloneNode(true));
                } else if (index < 10) {
                    continueRow.appendChild(card.cloneNode(true));
                } else {
                    popularRow.appendChild(card.cloneNode(true));
                }
            });
        }

        // Create a card element for playlist item
        function createCard(item, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => loadStream(item.url);
            
            card.innerHTML = `
                <img src="https://via.placeholder.com/200x112/333333/666666?text=${encodeURIComponent(item.title.substring(0, 20))}" alt="${item.title}">
                <div class="card-overlay">
                    <div class="play-icon"><i class="fas fa-play"></i></div>
                    <div class="card-title">${item.title}</div>
                </div>
            `;
            
            return card;
        }

        // Show playlist modal
        function showPlaylist() {
            const modal = document.getElementById('playlist-modal');
            const playlistItems = document.getElementById('playlist-items');
            
            playlistItems.innerHTML = '';
            
            playlistData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'playlist-item';
                div.onclick = () => {
                    loadStream(item.url);
                    closeModal();
                };
                
                div.innerHTML = `
                    <div class="item-title">${item.title}</div>
                    <div class="item-url">${item.url.substring(0, 50)}...</div>
                `;
                
                playlistItems.appendChild(div);
            });
            
            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('playlist-modal').classList.remove('active');
        }

        // UI Helper functions
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            document.getElementById('error-text').textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        // Video controls
        function togglePlayPause() {
            if (videoElement.paused) {
                videoElement.play();
                isPlaying = true;
            } else {
                videoElement.pause();
                isPlaying = false;
            }
            updatePlayPauseIcon();
        }

        function updatePlayPauseIcon() {
            const icon = document.querySelector('#play-pause i');
            if (icon) {
                icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
            }
        }

        function toggleMute() {
            videoElement.muted = !videoElement.muted;
            isMuted = videoElement.muted;
            updateVolumeIcon();
        }

        function updateVolumeIcon() {
            const icon = document.querySelector('#volume-btn i');
            if (icon) {
                if (isMuted || currentVolume === 0) {
                    icon.className = 'fas fa-volume-mute';
                } else if (currentVolume < 0.5) {
                    icon.className = 'fas fa-volume-down';
                } else {
                    icon.className = 'fas fa-volume-up';
                }
            }
        }

        function setVolume(value) {
            currentVolume = Math.max(0, Math.min(1, value));
            videoElement.volume = currentVolume;
            document.getElementById('volume-fill').style.width = (currentVolume * 100) + '%';
            
            if (currentVolume === 0) {
                videoElement.muted = true;
                isMuted = true;
            } else {
                videoElement.muted = false;
                isMuted = false;
            }
            
            updateVolumeIcon();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.querySelector('.video-container').requestFullscreen();
                isFullscreen = true;
            } else {
                document.exitFullscreen();
                isFullscreen = false;
            }
            updateFullscreenIcon();
        }

        function updateFullscreenIcon() {
            const icon = document.querySelector('#fullscreen-btn i');
            if (icon) {
                icon.className = isFullscreen ? 'fas fa-compress' : 'fas fa-expand';
            }
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            initPlayer();

            // Header scroll effect
            window.addEventListener('scroll', () => {
                const header = document.getElementById('header');
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });

            // Video event listeners
            videoElement.addEventListener('timeupdate', () => {
                const progress = (videoElement.currentTime / videoElement.duration) * 100;
                document.getElementById('progress-fill').style.width = progress + '%';
                
                document.getElementById('time-display').textContent = 
                    `${formatTime(videoElement.currentTime)} / ${formatTime(videoElement.duration)}`;
            });

            videoElement.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayPauseIcon();
            });

            // Control buttons
            document.getElementById('play-pause').addEventListener('click', togglePlayPause);
            document.getElementById('volume-btn').addEventListener('click', toggleMute);
            document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);
            
            // Progress bar click
            document.getElementById('progress-bar').addEventListener('click', (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                videoElement.currentTime = pos * videoElement.duration;
            });

            // Volume slider
            document.getElementById('volume-slider').addEventListener('click', (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                setVolume(pos);
            });

            // Settings button (show playlist)
            document.getElementById('settings-btn').addEventListener('click', showPlaylist);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlayPause();
                } else if (e.code === 'KeyF') {
                    toggleFullscreen();
                } else if (e.code === 'KeyM') {
                    toggleMute();
                }
            });
        });
    </script>
</body>
</html>
