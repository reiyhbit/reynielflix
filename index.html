<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat3Movie Video Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: rgba(255,255,255,0.8);
        }
        
        .url-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .url-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            min-width: 250px;
        }
        .url-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .url-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .nav-btn {
            padding: 15px 30px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .proxy-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .proxy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }
        .proxy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .proxy-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .panel-header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .panel-content {
            padding: 20px;
            max-height: 500px;
            overflow: auto;
        }
        
        .source-content {
            font-family: monospace;
            font-size: 12px;
            color: #0ff;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .highlight-m3u8 {
            background: #ff6b6b;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }
        .highlight-mp4 {
            background: #4ade80;
            color: black;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }
        .highlight-sooplive {
            background: #fbbf24;
            color: black;
            padding: 2px 4px;
            border-radius: 3px;
        }
        
        .video-found {
            background: rgba(74, 222, 128, 0.1);
            border-left: 4px solid #4ade80;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .logo-found {
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid #fbbf24;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .video-link {
            background: rgba(0,0,0,0.3);
            color: #4ade80;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 10px 0;
        }
        .logo-preview {
            max-width: 150px;
            max-height: 200px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #fbbf24;
        }
        
        .m3u-output {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .m3u-header {
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .m3u-content {
            background: rgba(0,0,0,0.5);
            color: #ffd700;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 150px;
            overflow: auto;
            white-space: pre-wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 14px;
        }
        
        .manual-area {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            color: #0ff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        .badge-m3u8 {
            background: #ff6b6b;
            color: white;
        }
        .badge-mp4 {
            background: #4ade80;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Cat3Movie Video Extractor</h1>
            <p>Auto-detect: .m3u8 | .mp4 | .mkv | sooplive | bigo</p>
        </div>

        <div class="url-bar">
            <input type="text" class="url-input" id="urlInput" placeholder="https://www.cat3movie.club/movie-name/" value="https://www.cat3movie.club/bulong-ng-laman/">
            <button class="nav-btn" onclick="loadPage()">EXTRACT VIDEO</button>
        </div>

        <div class="proxy-selector" id="proxySelector">
            <button class="proxy-btn active" onclick="setProxy('corsproxy')">🔄 CORS Proxy</button>
            <button class="proxy-btn" onclick="setProxy('allorigins')">🌐 AllOrigins</button>
            <button class="proxy-btn" onclick="setProxy('thingproxy')">🔧 ThingProxy</button>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    📄 VIEW SOURCE | <span style="color: #4ade80;">Hanapin: video files</span>
                </div>
                <div class="panel-content">
                    <div class="source-content" id="sourceContent">
                        I-paste ang URL at i-click EXTRACT VIDEO
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    🔍 EXTRACTED VIDEOS | <span style="color: #fbbf24;">.m3u8 | .mp4</span>
                </div>
                <div class="panel-content" id="extractContent">
                    <div style="color: rgba(255,255,255,0.5); text-align: center; padding: 50px 20px;">
                        ⚡ Maghintay habang naglo-load...
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            ✅ Ready | Auto-detect lahat ng video formats
        </div>
    </div>

    <script>
        let currentProxy = 'corsproxy';
        let currentVideo = '';
        let currentLogo = '';
        let currentTitle = '';
        let videoFormat = '';

        const proxies = {
            'corsproxy': 'https://corsproxy.io/?',
            'allorigins': 'https://api.allorigins.win/raw?url=',
            'thingproxy': 'https://thingproxy.freeboard.io/fetch/'
        };

        function setProxy(proxy) {
            currentProxy = proxy;
            document.querySelectorAll('.proxy-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateStatus(`✅ Proxy set to: ${proxy}`);
        }

        async function loadPage() {
            let url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            updateStatus('⏳ Loading page source...');
            document.getElementById('sourceContent').innerHTML = '⏳ Fetching page source...';
            document.getElementById('extractContent').innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 50px 20px;">⏳ Extracting videos...</div>';

            let html = null;
            
            for (let proxy of ['corsproxy', 'allorigins', 'thingproxy']) {
                try {
                    updateStatus(`⏳ Trying ${proxy}...`);
                    let proxyUrl = proxies[proxy] + encodeURIComponent(url);
                    
                    let response = await fetch(proxyUrl, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        }
                    });
                    
                    if (response.ok) {
                        html = await response.text();
                        updateStatus(`✅ Loaded using ${proxy}`);
                        break;
                    }
                } catch (e) {
                    console.log(`${proxy} failed:`, e);
                }
            }

            if (html) {
                displaySource(html);
                extractAll(html);
            } else {
                showManualMode(url);
            }
        }

        function displaySource(html) {
            // Format HTML with highlights for different video formats
            let formatted = html
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                // Highlight .m3u8 files
                .replace(/(https?:[^"'\s]+\.m3u8[^"'\s]*)/g, '<span class="highlight-m3u8">$1</span>')
                // Highlight .mp4 files
                .replace(/(https?:[^"'\s]+\.mp4[^"'\s]*)/g, '<span class="highlight-mp4">$1</span>')
                // Highlight sooplive
                .replace(/(https?:[^"'\s]*sooplive[^"'\s]*)/g, '<span class="highlight-sooplive">$1</span>')
                // Highlight bigo
                .replace(/(https?:[^"'\s]*bigo[^"'\s]*)/g, '<span class="highlight-sooplive">$1</span>')
                // Highlight file sources
                .replace(/("file":"[^"]+")/g, '<span class="highlight-mp4">$1</span>');
            
            document.getElementById('sourceContent').innerHTML = formatted;
        }

        function extractAll(html) {
            let extractDiv = document.getElementById('extractContent');
            let output = '';

            // Reset
            currentVideo = '';
            currentLogo = '';
            currentTitle = '';

            // 1. Find ALL video files (m3u8, mp4, mkv, etc)
            let videoPatterns = [
                // M3U8 patterns
                { pattern: /file:\s*["']([^"']+\.m3u8[^"']*)["']/g, type: 'm3u8' },
                { pattern: /(https?:[^"'\s]+\.m3u8[^"'\s]*)/g, type: 'm3u8' },
                { pattern: /source:\s*["']([^"']+\.m3u8[^"']*)["']/g, type: 'm3u8' },
                { pattern: /src:\s*["']([^"']+\.m3u8[^"']*)["']/g, type: 'm3u8' },
                // MP4 patterns
                { pattern: /file:\s*["']([^"']+\.mp4[^"']*)["']/g, type: 'mp4' },
                { pattern: /(https?:[^"'\s]+\.mp4[^"'\s]*)/g, type: 'mp4' },
                { pattern: /source:\s*["']([^"']+\.mp4[^"']*)["']/g, type: 'mp4' },
                { pattern: /src:\s*["']([^"']+\.mp4[^"']*)["']/g, type: 'mp4' },
                // Sooplive specific
                { pattern: /(https?:[^"'\s]*sooplive[^"'\s]+\.(m3u8|mp4)[^"'\s]*)/g, type: 'sooplive' },
                // Bigo specific
                { pattern: /(https?:[^"'\s]*bigo[^"'\s]+\.mp4[^"'\s]*)/g, type: 'bigo' }
            ];

            let allVideos = [];

            videoPatterns.forEach(({pattern, type}) => {
                let matches = [...html.matchAll(pattern)];
                matches.forEach(match => {
                    let url = match[1] || match[0];
                    if (url && !allVideos.some(v => v.url === url)) {
                        allVideos.push({
                            url: url,
                            type: type
                        });
                    }
                });
            });

            if (allVideos.length > 0) {
                output += '<div class="video-found">';
                output += '<div style="color:#4ade80; font-weight:bold; margin-bottom:10px;">🎥 VIDEO FOUND</div>';
                
                allVideos.forEach((video, index) => {
                    let badgeColor = video.type === 'm3u8' ? '#ff6b6b' : '#4ade80';
                    output += `<div style="margin-bottom:15px; padding:10px; background:rgba(0,0,0,0.2); border-radius:5px;">`;
                    output += `<div><span class="badge" style="background:${badgeColor};">${video.type}</span></div>`;
                    output += `<div class="video-link">${video.url}</div>`;
                    
                    // Save first video as current
                    if (index === 0) {
                        currentVideo = video.url;
                        videoFormat = video.type;
                    }
                    output += `</div>`;
                });
                
                output += '</div>';
            } else {
                output += '<div class="video-found" style="border-left-color:#ef4444;">';
                output += '<div style="color:#ef4444; font-weight:bold;">❌ NO VIDEO FOUND</div>';
                output += '<div style="color:rgba(255,255,255,0.5); margin-top:10px;">Try searching: file:, source:, src:, .mp4, .m3u8</div>';
                output += '</div>';
            }

            // 2. Extract Logo (TMDB)
            let logoPattern = /https:\/\/image\.tmdb\.org\/[^"'\s]+/g;
            let logos = html.match(logoPattern);
            
            if (logos && logos.length > 0) {
                currentLogo = logos[0];
                output += '<div class="logo-found">';
                output += '<div style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">🖼️ LOGO FOUND</div>';
                output += `<img src="${currentLogo}" class="logo-preview" onerror="this.style.display='none'">`;
                output += `<div class="video-link" style="color:#fbbf24;">${currentLogo}</div>`;
                output += '</div>';
            }

            // 3. Extract Title
            let titleMatch = html.match(/<title>(.+?)<\/title>/);
            if (titleMatch) {
                currentTitle = titleMatch[1].replace(/ \| Cat3Movie.*$/, '').trim();
                output += '<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:5px; margin-top:15px;">';
                output += '<div style="color:rgba(255,255,255,0.5); margin-bottom:5px;">📌 Movie Title</div>';
                output += `<div style="color:#fff; font-weight:bold;">${currentTitle}</div>`;
                output += '</div>';
            }

            // 4. Generate M3U (kung may video)
            if (currentVideo) {
                let logoTag = currentLogo ? ` tvg-logo="${currentLogo}"` : '';
                let m3uContent = `#EXTM3U\n#EXTINF:-1${logoTag},${currentTitle || 'Movie'}\n${currentVideo}`;
                
                output += '<div class="m3u-output">';
                output += '<div class="m3u-header">📀 GENERATED M3U FILE</div>';
                output += `<div class="m3u-content" id="m3uContent">${m3uContent}</div>`;
                output += '<div class="btn-group">';
                output += '<button class="btn btn-primary" onclick="downloadM3U()">⬇️ DOWNLOAD .m3u</button>';
                output += '<button class="btn btn-success" onclick="copyM3U()">📋 COPY M3U</button>';
                output += '</div>';
                output += '</div>';
            }

            extractDiv.innerHTML = output;
        }

        function showManualMode(url) {
            document.getElementById('sourceContent').innerHTML = `
                <div style="color:#ef4444; margin-bottom:10px;">❌ Cannot auto-fetch page</div>
                <div style="color:rgba(255,255,255,0.5); margin-bottom:15px;">Gawin ito:</div>
                <ol style="color:rgba(255,255,255,0.8); margin-left:20px;">
                    <li>I-open sa bagong tab: <b>view-source:${url}</b></li>
                    <li>Ctrl+A, Ctrl+C (copy lahat)</li>
                    <li>I-paste sa box sa ibaba</li>
                </ol>
            `;
            
            document.getElementById('extractContent').innerHTML = `
                <textarea class="manual-area" id="manualSource" placeholder="I-paste ang HTML source dito..."></textarea>
                <button class="btn btn-primary" style="width:100%;" onclick="processManualSource()">🔍 EXTRACT VIDEOS</button>
            `;
            
            updateStatus('📝 Manual mode - I-paste ang source');
        }

        function processManualSource() {
            let html = document.getElementById('manualSource').value;
            if (html) {
                displaySource(html);
                extractAll(html);
                updateStatus('✅ Manual source processed');
            }
        }

        function downloadM3U() {
            let m3uContent = document.getElementById('m3uContent').textContent;
            let filename = (currentTitle || 'movie').toLowerCase().replace(/[^a-z0-9]+/g, '_') + '.m3u';
            
            let blob = new Blob([m3uContent], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            
            updateStatus('✅ M3U file downloaded');
        }

        function copyM3U() {
            let m3uContent = document.getElementById('m3uContent').textContent;
            navigator.clipboard.writeText(m3uContent);
            updateStatus('✅ M3U copied to clipboard');
        }

        function updateStatus(message) {
            document.getElementById('statusBar').innerHTML = message;
        }
    </script>
</body>
</html>
